apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3-unstract
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  encrypted: "true"
  tagSpecification_1: "Environment=production"
  tagSpecification_2: "Team=forsys"
  tagSpecification_3: "kubernetes.io/cluster/ejm-int=owned"
  tagSpecification_4: "org: dataclassification=public"
  tagSpecification_5: "karpenter.k8s.aws/ec2nodeclass=Ilmwhisperer"
  tagSpecification_6: "org:automation:env=int"
  tagSpecification_7: "org:teamname=cloud"
  tagSpecification_8: "org.repo=SP5FT/terraform-aws-eks-ejm"
  tagSpecification_9: "org.appname=eks"
  tagSpecification_10: "org:stack=058264298758-ejm-int-unwrapped"
  tagSpecification_11: "eks:eks-cluster-name=ejm-int"
  tagSpecification_12: "org:domain=ejm"
  tagSpecification_13: "drirpo=1h"
  tagSpecification_14: "org:appsuite=eks"
  tagSpecification_15: "org:branch=main"
  tagSpecification_16: "org:publicacing=false"
  tagSpecification_17: "karpenter.sh/nodepool=Ilmwhisperer"
  tagSpecification_18: "org:compliance=na"
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true